<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17261d" />
    <title>The Merry Band — Sherwood Family Photo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #17261d;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #17261d;
      }

      #family-photo {
        display: grid;
        width: 100%;
        height: 100%;
        place-items: center;
      }

      #family-photo-canvas {
        display: block;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        background: #a8c4a0;
      }

      #family-photo-status {
        position: fixed;
        inset: auto 50% 2rem auto;
        z-index: 1;
        max-width: min(32rem, calc(100vw - 3rem));
        padding: 0.7rem 1rem;
        translate: 50% 0;
        border: 1px solid rgb(255 255 255 / 18%);
        border-radius: 999px;
        color: #f4ebcc;
        background: rgb(23 38 29 / 88%);
        box-shadow: 0 0.75rem 2rem rgb(0 0 0 / 28%);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-align: center;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body data-family-photo-ready="loading">
    <main id="family-photo">
      <p id="family-photo-status" role="status" aria-live="polite">Assembling the Merry Band…</p>
    </main>
    <script type="module" src="/src/family-photo-entry.ts"></script>
  </body>
</html>
